<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Veggie Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Auth Page -->
  <div id="authPage" class="page">
    <div class="auth-container">
      <h1>🥬 Fresh Veggie Shop</h1>
      <div id="loginForm" class="auth-form">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button onclick="login()">Login</button>
        <p>Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></p>
      </div>
      <div id="signupForm" class="auth-form hidden">
        <h2>Sign Up</h2>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>
        <button onclick="signup()">Sign Up</button>
        <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
      </div>
      <div id="verifyForm" class="auth-form hidden">
        <h2>Verify Email</h2>
        <p style="margin-bottom: 15px; color: #666;">Enter the 6-digit code sent to your email</p>
        <input type="email" id="verifyEmail" readonly style="background: #f5f5f5;">
        <input type="text" id="verifyCode" placeholder="Enter 6-digit code" maxlength="6" required>
        <button onclick="verifyCode()">Verify</button>
        <p>Didn't receive code? <a href="#" onclick="showSignup()">Try again</a></p>
      </div>
    </div>
  </div>

  <!-- Shop Page -->
  <div id="shopPage" class="page hidden">
    <nav>
      <h1>🥬 Fresh Veggie Shop</h1>
      <div class="nav-links">
        <a href="#" onclick="showHome()">Home</a>
        <a href="#" onclick="showCart()">Cart (<span id="cartCount">0</span>)</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
    </nav>

    <div id="homePage" class="content">
      <h2>Fresh Vegetables</h2>
      <div id="productGrid" class="product-grid"></div>
    </div>

    <div id="cartPage" class="content hidden">
      <h2>Your Cart</h2>
      <div id="cartItems"></div>
      <div id="cartTotal" class="cart-total"></div>
      <button onclick="showCheckout()" class="checkout-btn">Proceed to Checkout</button>
    </div>

    <div id="checkoutPage" class="content hidden">
      <h2>Checkout</h2>
      <div class="checkout-form">
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Address" required>
        <input type="tel" placeholder="Phone Number" required>
        <div id="orderSummary"></div>
        <button onclick="placeOrder()" class="checkout-btn">Place Order</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
